jobs:
  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build binaries and npm packages
        run: |
          export VERSION=0.0.0-pr.${{ github.event.pull_request.number }}
          pnpm pack:prepare

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux binaries for Docker
        run: |
          export VERSION=0.0.0-pr.${{ github.event.pull_request.number }}
          node packaging/pack.ts build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Debian image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: datamitsu:pr-${{ github.event.pull_request.number }}

      - name: Build Alpine image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./docker/Dockerfile.alpine
          platforms: linux/amd64,linux/arm64
          push: false
          tags: datamitsu:pr-${{ github.event.pull_request.number }}-alpine

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run datamitsu lint
        run: pnpm dm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Go tests
        run: pnpm test

      - name: Run JavaScript tests
        run: pnpm --filter @datamitsu/programmable-api-js test

name: PR Checks

on:
  pull_request:
    branches: [main]
