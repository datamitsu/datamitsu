jobs:
  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Auto-detects from package.json packageManager field

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          # Auto-detects from .node-version

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - env:
          GORELEASER_CURRENT_TAG: 0.0.0-pr.${{ github.event.pull_request.number }}
        name: Build binaries with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --snapshot --clean

          distribution: goreleaser
          version: latest
      - name: Prepare npm packages
        run: |
          export VERSION=0.0.0-pr.${{ github.event.pull_request.number }}
          pnpm pack:prepare

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - env:
          GORELEASER_CURRENT_TAG: 0.0.0-pr.${{ github.event.pull_request.number }}
        name: Build binaries with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --snapshot --clean

          distribution: goreleaser
          version: latest
      - name: Prepare binaries for Docker
        run: |
          VERSION="0.0.0-pr.${{ github.event.pull_request.number }}"

          # GoReleaser creates: dist/datamitsu-binary/datamitsu_{VERSION}_linux_{arch}
          # Docker expects: dist/datamitsu-linux-{arch}/datamitsu

          mkdir -p dist/datamitsu-linux-amd64
          mkdir -p dist/datamitsu-linux-arm64

          cp "dist/datamitsu-binary/datamitsu_${VERSION}_linux_amd64" dist/datamitsu-linux-amd64/datamitsu
          cp "dist/datamitsu-binary/datamitsu_${VERSION}_linux_arm64" dist/datamitsu-linux-arm64/datamitsu

          chmod +x dist/datamitsu-linux-*/datamitsu
          ls -lh dist/datamitsu-linux-*/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Debian image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: datamitsu:pr-${{ github.event.pull_request.number }}

      - name: Build Alpine image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ./docker/Dockerfile.alpine
          platforms: linux/amd64,linux/arm64
          push: false
          tags: datamitsu:pr-${{ github.event.pull_request.number }}-alpine

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Auto-detects from package.json packageManager field

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          # Auto-detects from .node-version

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run datamitsu lint
        run: pnpm dm lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Auto-detects from package.json packageManager field

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          # Auto-detects from .node-version

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Go tests
        run: pnpm test

      - name: Run JavaScript tests
        run: pnpm --filter @datamitsu/programmable-api-js test

name: PR Checks

on:
  pull_request:
    branches: [main]
