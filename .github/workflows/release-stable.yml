jobs:
  docker:
    name: Build and Push Docker Images
    needs: [validate, goreleaser]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux binaries for Docker
        run: |
          export VERSION=${{ needs.validate.outputs.version }}
          node packaging/pack.ts build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - if: matrix.registry == 'ghcr'
        name: Login to GHCR
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}

      - if: matrix.registry == 'dockerhub'
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}

      - id: meta
        name: Docker meta
        uses: docker/metadata-action@v5
        with:
          flavor: |
            latest=auto
            suffix=${{ matrix.variant == 'alpine' && '-alpine' || '' }}
          images: |
            ${{ matrix.registry == 'ghcr' && 'ghcr.io/datamitsu/datamitsu' || 'docker.io/datamitsu/datamitsu' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=stable

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ${{ matrix.variant == 'alpine' && './docker/Dockerfile.alpine' || './docker/Dockerfile' }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
    strategy:
      matrix:
        registry: [ghcr, dockerhub]
        variant: [debian, alpine]

  goreleaser:
    name: GoReleaser Build
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
          distribution: goreleaser
          version: latest

  npm-publish:
    name: Publish npm Packages
    needs: [validate, goreleaser]
    permissions:
      contents: read
      id-token: write # Required for provenance publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - env:
          VERSION: ${{ needs.validate.outputs.version }}
        name: Prepare npm packages
        run: pnpm pack:prepare

      - env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

        name: Publish to npm
        run: node packaging/pack.ts publish

  validate:
    name: Validate Release
    outputs:
      version: ${{ steps.version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          TAG_COMMIT=$(git rev-parse ${{ github.ref }})
          if ! git branch -r --contains $TAG_COMMIT | grep -q 'origin/main'; then
            echo "❌ Error: Tag ${{ github.ref_name }} is not on main branch"
            exit 1
          fi
          echo "✅ Tag is on main branch"

      - id: version
        name: Extract version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

name: Release (Stable)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  contents: write
  packages: write
