jobs:
  test-deploy:
    name: Test deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        # Auto-detects from package.json packageManager field

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".node-version"

      - name: Cache datamitsu store
        uses: actions/cache@v5
        with:
          key: datamitsu-store-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'datamitsu.config.js', 'datamitsu.config.ts') }}
          path: ~/.cache/datamitsu/store
          restore-keys: |
            datamitsu-store-${{ hashFiles('package.json', 'pnpm-lock.yaml') }}
            datamitsu-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - env:
          NODE_ENV: production
        name: Test build website
        run: pnpm --filter website build

name: Test Website Build

on:
  pull_request:
    branches:
      - main
