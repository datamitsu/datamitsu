jobs:
  build:
    name: Build Unstable Release
    outputs:
      short_sha: ${{ steps.version.outputs.short_sha }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}

      - id: version
        name: Generate version
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="0.0.0-unstable.${DATE}.${SHORT_SHA}"
          TAG_NAME="unstable-${DATE}-${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📦 npm version: $VERSION"
          echo "🏷️  git tag: $TAG_NAME"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all artifacts
        run: |
          export VERSION=${{ steps.version.outputs.version }}
          pnpm pack:prepare

      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: dist/datamitsu-*/datamitsu*
          name: Unstable Build ${{ steps.version.outputs.short_sha }}
          prerelease: true
          tag_name: ${{ steps.version.outputs.tag_name }}

  docker:
    name: Build Unstable Docker Images
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux binaries for Docker
        run: |
          export VERSION=${{ needs.build.outputs.version }}
          node packaging/pack.ts build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - if: matrix.registry == 'ghcr'
        name: Login to GHCR
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}

      - if: matrix.registry == 'dockerhub'
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}

      - id: image
        name: Determine image name
        run: |
          if [ "${{ matrix.registry }}" = "ghcr" ]; then
            echo "name=ghcr.io/datamitsu/datamitsu-unstable" >> $GITHUB_OUTPUT
          else
            echo "name=docker.io/datamitsu/datamitsu" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ${{ matrix.variant == 'alpine' && './docker/Dockerfile.alpine' || './docker/Dockerfile' }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ matrix.registry == 'ghcr' && 'latest' || 'unstable' }}${{ matrix.variant == 'alpine' && '-alpine' || '' }}
            ${{ steps.image.outputs.name }}:${{ needs.build.outputs.tag_name }}${{ matrix.variant == 'alpine' && '-alpine' || '' }}
    strategy:
      matrix:
        registry: [ghcr, dockerhub]
        variant: [debian, alpine]

  npm-publish:
    name: Publish Unstable to npm
    needs: build
    permissions:
      contents: read
      id-token: write # Required for provenance publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/setup-go@v5
        with:
          cache: true
          go-version: "1.26"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - env:
          VERSION: ${{ needs.build.outputs.version }}
        name: Prepare npm packages
        run: pnpm pack:prepare

      - env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        name: Publish to npm with provenance
        run: |
          # Publish with provenance and unstable tag
          cd packaging/npm
          for dir in datamitsu-*/ datamitsu/; do
            cd "$dir"
            npm publish --access public --provenance --tag unstable
            cd ..
          done

name: Release (Unstable)

on:
  workflow_dispatch:
    inputs:
      ref:
        default: "feat/setup-ci-release"
        description: "Branch or commit to build"
        required: true

permissions:
  contents: write
  packages: write
