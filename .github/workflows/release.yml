jobs:
  build:
    if: |
      always() &&
      !cancelled() &&
      (needs.validate-stable.result == 'success' || needs.generate-unstable-version.result == 'success')
    name: Build Release
    needs: [determine-release-type, validate-stable, generate-unstable-version]
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout + Setup
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.determine-release-type.outputs.checkout_ref }}

      - uses: ./.github/actions/setup-environment

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # 2. Build Binaries (GoReleaser)
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.determine-release-type.outputs.is_stable == 'true' && needs.validate-stable.outputs.version || needs.generate-unstable-version.outputs.version }}
        name: Build binaries with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release ${{ needs.determine-release-type.outputs.is_unstable == 'true' && '--snapshot' || '' }} --clean
          distribution: goreleaser
          version: "~> v2"

      # 3. Normalize binaries
      - name: Normalize binaries
        run: .github/scripts/normalize-binaries.sh "${{ needs.determine-release-type.outputs.is_unstable }}"

      # 4. Build Programmable API
      - name: Build programmable API
        run: |
          cd programmable-api/js
          pnpm build
          cd ../..
          mkdir -p packaging/npm/datamitsu/lib
          cp -r programmable-api/js/dist/* packaging/npm/datamitsu/lib/
          echo "✓ Copied programmable API to lib/"
          ls -lh packaging/npm/datamitsu/lib/

      # 5. Prepare npm Packages
      - name: Prepare npm packages
        run: |
          export VERSION=${{ needs.determine-release-type.outputs.is_stable == 'true' && needs.validate-stable.outputs.version || needs.generate-unstable-version.outputs.version }}
          pnpm pack:prepare

      # 6. Prepare Docker Binaries
      - name: Prepare Docker binaries
        run: |
          mkdir -p dist/datamitsu-linux-amd64
          mkdir -p dist/datamitsu-linux-arm64

          cp dist/binaries/datamitsu-linux_amd64 dist/datamitsu-linux-amd64/datamitsu
          cp dist/binaries/datamitsu-linux_arm64 dist/datamitsu-linux-arm64/datamitsu

          chmod +x dist/datamitsu-linux-*/datamitsu
          ls -lh dist/datamitsu-linux-*/

      # 7. Test Docker Build (dry-run, no push)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Generate metadata for test builds
      - id: meta-debian
        name: Generate Docker metadata (Debian)
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/datamitsu/datamitsu
            docker.io/datamitsu/datamitsu
          labels: |
            org.opencontainers.image.version=${{ needs.determine-release-type.outputs.is_stable == 'true' && needs.validate-stable.outputs.version || needs.generate-unstable-version.outputs.version }}

          tags: |
            type=raw,value=test-debian
      - id: meta-alpine
        name: Generate Docker metadata (Alpine)
        uses: docker/metadata-action@v6
        with:
          flavor: |
            suffix=-alpine
          images: |
            ghcr.io/datamitsu/datamitsu
            docker.io/datamitsu/datamitsu
          labels: |
            org.opencontainers.image.version=${{ needs.determine-release-type.outputs.is_stable == 'true' && needs.validate-stable.outputs.version || needs.generate-unstable-version.outputs.version }}

          tags: |
            type=raw,value=test-alpine
      - name: Test Docker build (Debian)
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max

          context: .
          file: ./docker/Dockerfile
          labels: ${{ steps.meta-debian.outputs.labels }}
          load: false
          platforms: linux/amd64,linux/arm64
          push: false
      - name: Test Docker build (Alpine)
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max

          context: .
          file: ./docker/Dockerfile.alpine
          labels: ${{ steps.meta-alpine.outputs.labels }}
          load: false
          platforms: linux/amd64,linux/arm64
          push: false
      # 8. Upload Artifact (everything needed for publish jobs)
      - if: ${{ !env.ACT }}
        name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            dist/
            packaging/npm/
          retention-days: 1

  determine-release-type:
    name: Determine Release Type
    outputs:
      checkout_ref: ${{ steps.detect.outputs.checkout_ref }}
      is_stable: ${{ steps.detect.outputs.is_stable }}
      is_unstable: ${{ steps.detect.outputs.is_unstable }}
    runs-on: ubuntu-latest
    steps:
      - id: detect
        name: Detect release type
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push → stable
            echo "is_stable=true" >> $GITHUB_OUTPUT
            echo "is_unstable=false" >> $GITHUB_OUTPUT
            echo "checkout_ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "📦 Detected: Stable release (tag push)"
          elif [[ "${{ github.event.inputs.release_type }}" == "stable" ]]; then
            # Manual stable release
            VERSION_TAG="${{ github.event.inputs.version }}"
            if [[ -z "$VERSION_TAG" ]]; then
              echo "❌ Error: version input required for manual stable release"
              exit 1
            fi
            echo "is_stable=true" >> $GITHUB_OUTPUT
            echo "is_unstable=false" >> $GITHUB_OUTPUT
            echo "checkout_ref=$VERSION_TAG" >> $GITHUB_OUTPUT
            echo "📦 Detected: Manual stable release ($VERSION_TAG)"
          else
            # Manual unstable release
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "is_unstable=true" >> $GITHUB_OUTPUT
            echo "checkout_ref=${{ github.event.inputs.ref }}" >> $GITHUB_OUTPUT
            echo "📦 Detected: Unstable release"
          fi

  generate-unstable-version:
    if: |
      always() &&
      needs.determine-release-type.outputs.is_unstable == 'true'
    name: Generate Unstable Version
    needs: determine-release-type
    outputs:
      short_sha: ${{ steps.version.outputs.short_sha }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      version: ${{ steps.version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.determine-release-type.outputs.checkout_ref }}

      - id: version
        name: Generate unstable version
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="0.0.0-unstable.${DATE}.${SHORT_SHA}"
          TAG_NAME="unstable-${DATE}-${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📦 npm version: $VERSION"
          echo "🏷️  git tag: $TAG_NAME"

  publish-docker:
    if: |
      always() &&
      !cancelled() &&
      needs.build.result == 'success'
    name: Publish Docker Images
    needs: [build, determine-release-type, validate-stable, generate-unstable-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-release-type.outputs.checkout_ref }}

      - if: ${{ !env.ACT }}
        name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-artifacts
          path: .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - if: ${{ !env.ACT && matrix.registry == 'ghcr' }}
        name: Login to GHCR
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}

          registry: ghcr.io
          username: ${{ github.actor }}
      - if: ${{ !env.ACT && matrix.registry == 'dockerhub' }}
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}

          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}

      # Generate metadata for production builds
      - id: meta
        name: Generate Docker metadata
        uses: docker/metadata-action@v6
        with:
          flavor: |
            suffix=${{ matrix.variant == 'alpine' && '-alpine' || '' }}
          images: |
            ${{ matrix.registry == 'ghcr' && format('ghcr.io/datamitsu/{0}', needs.determine-release-type.outputs.is_stable == 'true' && 'datamitsu' || 'datamitsu-unstable') || 'docker.io/datamitsu/datamitsu' }}
          labels: |
            org.opencontainers.image.version=${{ needs.determine-release-type.outputs.is_stable == 'true' && needs.validate-stable.outputs.version || needs.generate-unstable-version.outputs.version }}

          tags: |
            type=semver,pattern={{version}},enable=${{ needs.determine-release-type.outputs.is_stable == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.determine-release-type.outputs.is_stable == 'true' }}
            type=semver,pattern={{major}},enable=${{ needs.determine-release-type.outputs.is_stable == 'true' }}
            type=raw,value=stable,enable=${{ needs.determine-release-type.outputs.is_stable == 'true' }}
            type=raw,value=latest,enable=${{ needs.determine-release-type.outputs.is_stable == 'true' && !contains(needs.validate-stable.outputs.version, '-rc.') }}
            type=raw,value=unstable,enable=${{ needs.determine-release-type.outputs.is_unstable == 'true' && matrix.registry == 'dockerhub' }}
            type=raw,value=${{ needs.generate-unstable-version.outputs.tag_name }},enable=${{ needs.determine-release-type.outputs.is_unstable == 'true' }}

      - if: |
          matrix.registry == 'ghcr' ||
          (matrix.registry == 'dockerhub' && needs.determine-release-type.outputs.is_stable == 'true')
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: ${{ matrix.variant == 'alpine' && './docker/Dockerfile.alpine' || './docker/Dockerfile' }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          push: ${{ !env.ACT }}
          tags: ${{ steps.meta.outputs.tags }}
    strategy:
      matrix:
        registry: [ghcr, dockerhub]
        variant: [debian, alpine]
  publish-github:
    if: |
      needs.determine-release-type.outputs.is_unstable == 'true' &&
      github.event.inputs.create_github_prerelease
    name: Publish to GitHub Releases
    needs: [build, determine-release-type, generate-unstable-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-release-type.outputs.checkout_ref }}

      - if: ${{ !env.ACT }}
        name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-artifacts
          path: .

      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ !env.ACT }}
        name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          name: Unstable Build ${{ needs.generate-unstable-version.outputs.short_sha }}
          prerelease: true
          tag_name: ${{ needs.generate-unstable-version.outputs.tag_name }}

  publish-npm:
    if: |
      always() &&
      !cancelled() &&
      needs.build.result == 'success'
    name: Publish to npm
    needs: [build, determine-release-type, validate-stable, generate-unstable-version]
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-release-type.outputs.checkout_ref }}

      - uses: ./.github/actions/setup-environment
        with:
          registry-url: "https://registry.npmjs.org"

      - if: ${{ !env.ACT }}
        name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-artifacts
          path: .

      - if: ${{ !env.ACT }}
        name: Restore executable permissions
        run: |
          # GitHub Actions artifacts don't preserve executable permissions
          # Restore them for all platform-specific binaries
          find packaging/npm/datamitsu-* -type f \( -name "datamitsu" -o -name "datamitsu.exe" \) -exec chmod +x {} \;
          echo "✓ Restored executable permissions for npm package binaries"

      - if: ${{ !env.ACT }}
        name: Verify executable permissions
        run: |
          # Smoke test: ensure all binaries are executable before publishing
          FAILED=0
          for dir in packaging/npm/datamitsu-*/; do
            binary=$(find "$dir" -type f \( -name "datamitsu" -o -name "datamitsu.exe" \) | head -1)
            if [ -f "$binary" ]; then
              if [ ! -x "$binary" ]; then
                echo "❌ Binary not executable: $binary"
                FAILED=1
              else
                echo "✓ Executable: $binary"
              fi
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "❌ Some binaries are not executable. Aborting publish."
            exit 1
          fi
          echo "✓ All binaries are executable"

      - env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        name: Publish to npm
        run: |
          IS_STABLE="${{ needs.determine-release-type.outputs.is_stable }}"
          DRY_RUN=""
          if [[ -n "$ACT" ]]; then
            DRY_RUN="--dry-run"
            echo "🏃 Running in act mode - using --dry-run for npm publish"
          fi

          cd packaging/npm

          if [[ "$IS_STABLE" == "true" ]]; then
            # Stable: use pack.ts publish (auto-detects tag)
            node ../pack.ts publish $DRY_RUN
          else
            # Unstable: hardcoded unstable tag
            for dir in datamitsu-*/ datamitsu/; do
              cd "$dir"
              echo "📦 Publishing $dir..."
              npm publish --access public --tag unstable $DRY_RUN
              cd ..
            done
          fi

  validate-stable:
    if: |
      always() &&
      needs.determine-release-type.outputs.is_stable == 'true'
    name: Validate Stable Release
    needs: determine-release-type
    outputs:
      version: ${{ steps.version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.determine-release-type.outputs.checkout_ref }}

      - name: Verify tag is on main branch
        run: |
          TAG_REF="${{ needs.determine-release-type.outputs.checkout_ref }}"
          TAG_COMMIT=$(git rev-parse $TAG_REF)
          if ! git branch -r --contains $TAG_COMMIT | grep -q 'origin/main'; then
            echo "❌ Error: Tag $TAG_REF is not on main branch"
            exit 1
          fi
          echo "✅ Tag is on main branch"

      - id: version
        name: Extract version from tag
        run: |
          TAG_REF="${{ needs.determine-release-type.outputs.checkout_ref }}"
          VERSION="${TAG_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Stable version: $VERSION"

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"
  workflow_dispatch:
    inputs:
      create_github_prerelease:
        default: false
        description: "Create GitHub prerelease (for debugging binaries/checksums)"
        required: false
        type: boolean
      ref:
        default: "main"
        description: "Branch or commit to build (unstable only)"
        required: false
      release_type:
        default: unstable
        description: "Release type"
        options:
          - unstable
          - stable
        required: true
        type: choice
      version:
        description: "Version tag (stable manual, e.g., v1.0.0)"
        required: false
permissions:
  contents: write
  packages: write
